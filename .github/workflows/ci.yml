name: NeuroLearn CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js (Frontend & Backend)
      uses: actions/setup-node@v3
      with:
        node-version: 20
        cache: 'npm'

    - name: Set up Python (AI Service)
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Frontend Dependencies
      working-directory: ./frontend
      run: npm ci || npm install

    - name: Build Frontend
      working-directory: ./frontend
      run: npm run build

    - name: Install Backend Dependencies
      working-directory: ./backend
      run: npm ci || npm install

    - name: Build Backend (TypeScript validation)
      working-directory: ./backend
      run: npm run build

    - name: Install AI Service Dependencies
      working-directory: ./ai-service
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Generate AI Synthetic Model Weights
      working-directory: ./ai-service
      run: python train.py

    - name: Verify Docker Compose Build
      run: docker compose build
